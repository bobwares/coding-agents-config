# Implementation Manifest Template
# Generated by af-be-build-implementation skill

version: 1
kind: implementation-manifest

metadata:
  generatedAt: "{{ISO_TIMESTAMP}}"
  sourceStack: "{{IMPLEMENTATION_NAME}}"
  sourceDsl: "{{DSL_FILE_PATH}}"
  targetProject: "{{TARGET_PROJECT_PATH}}"
  executionPlan: "{{EXECUTION_PLAN_PATH}}"

source:
  appFactoryPath: "~/gallery/app-factory/tech-stack-implementations/backend/{{IMPLEMENTATION_NAME}}"
  stackProfile: "~/gallery/app-factory/tech-stack-profiles/backend/{{IMPLEMENTATION_NAME}}.yaml"

scaffold:
  copiedAt: "{{SCAFFOLD_COPY_TIMESTAMP}}"
  filesCount: "{{SCAFFOLD_FILES_COUNT}}"
  status: "{{copied|partial|failed}}"

modules:
  # One entry per bounded context
  - name: "{{CONTEXT_NAME}}"
    boundedContext: "{{BOUNDED_CONTEXT_ID}}"
    path: "{{MODULE_PATH}}"
    files:
      - path: "{{FILE_PATH}}"
        type: "{{module|controller|service|entity|dto|repository|mapper|test}}"
        status: "{{generated|modified|skipped}}"
        reason: "{{optional: reason for skipped}}"

boundedContexts:
  # Summary per bounded context
  - name: "{{CONTEXT_NAME}}"
    aggregates: "{{COUNT}}"
    entities: "{{COUNT}}"
    valueObjects: "{{COUNT}}"
    services: "{{COUNT}}"
    endpoints: "{{COUNT}}"
    events: "{{COUNT}}"
    repositories: "{{COUNT}}"

generatedArtifacts:
  entities: "{{COUNT}}"
  dtos: "{{COUNT}}"
  services: "{{COUNT}}"
  controllers: "{{COUNT}}"
  repositories: "{{COUNT}}"
  mappers: "{{COUNT}}"
  tests: "{{COUNT}}"
  migrations: "{{COUNT}}"

validation:
  compilation:
    status: "{{pass|fail|skipped}}"
    errors: []
  linting:
    status: "{{pass|fail|skipped}}"
    warnings: []
  typeChecking:
    status: "{{pass|fail|skipped}}"
    errors: []

dependencies:
  added:
    - name: "{{PACKAGE_NAME}}"
      version: "{{VERSION}}"
      reason: "{{WHY_ADDED}}"
  existing: []

configuration:
  filesModified:
    - path: "{{CONFIG_FILE}}"
      changes: "{{DESCRIPTION}}"

todos:
  # Business logic requiring human implementation
  - file: "{{FILE_PATH}}"
    line: "{{LINE_NUMBER}}"
    description: "{{TODO_DESCRIPTION}}"
    priority: "{{high|medium|low}}"

notes:
  - "{{GENERATION_NOTES_OR_WARNINGS}}"

nextSteps:
  - "{{RECOMMENDED_NEXT_ACTIONS}}"
