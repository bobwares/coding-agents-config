# API Contract
# Document: api-be-{{DOMAIN}}-rest-v1.0.yaml
# Domain: {{DOMAIN}}
# Version: 1.0.0
# Status: Draft
# Last Updated: {{CURRENT_DATE}}
# References:
#   - ddd-shared-{{DOMAIN}}-core-v1.0.md
#   - prd-be-{{DOMAIN}}-services-v1.0.md
#   - ddd-be-{{DOMAIN}}-core-v1.0.md

openapi: "3.0.3"
info:
  title: "{{DOMAIN_TITLE}} API"
  version: "1.0.0"
  description: "REST API contract for {{DOMAIN_TITLE}} domain"
  contact:
    name: "[Team Name]"
    email: "[team@example.com]"

servers:
  - url: "/api/v1"
    description: "API v1"

tags:
  - name: "[Resource]"
    description: "[Resource operations]"

paths:
  /[resource]:
    get:
      tags:
        - "[Resource]"
      summary: "List [resources]"
      description: "Retrieves a paginated list of [resources]"
      operationId: "list[Resources]"
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: sort
          in: query
          schema:
            type: string
            enum: [createdAt, updatedAt, name]
            default: createdAt
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/[Resource]ListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags:
        - "[Resource]"
      summary: "Create [resource]"
      description: "Creates a new [resource]"
      operationId: "create[Resource]"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create[Resource]Request"
      responses:
        "201":
          description: "Created successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/[Resource]Response"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /[resource]/{id}:
    get:
      tags:
        - "[Resource]"
      summary: "Get [resource] by ID"
      description: "Retrieves a single [resource] by its identifier"
      operationId: "get[Resource]ById"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/[Resource]Response"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags:
        - "[Resource]"
      summary: "Update [resource]"
      description: "Updates an existing [resource]"
      operationId: "update[Resource]"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Update[Resource]Request"
      responses:
        "200":
          description: "Updated successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/[Resource]Response"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      tags:
        - "[Resource]"
      summary: "Delete [resource]"
      description: "Deletes a [resource]"
      operationId: "delete[Resource]"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: "Deleted successfully"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  schemas:
    # Request schemas
    Create[Resource]Request:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: "[Field description]"
        # Add more fields

    Update[Resource]Request:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: "[Field description]"
        # Add more fields

    # Response schemas
    "[Resource]Response":
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    "[Resource]ListResponse":
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/[Resource]Response"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    # Error schemas
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

  responses:
    BadRequest:
      description: "Bad request"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: "Unauthorized"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: "Resource not found"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: "Validation error"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: "Internal server error"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
